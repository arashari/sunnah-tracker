<!DOCTYPE html>
<html lang="id">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#10b981" />
		<meta name="description" content="Calendar app for tracking sunnah deeds, especially fasting" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="Sunnah" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icon.svg" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
		<script>
			window.OneSignalDeferred = window.OneSignalDeferred || [];
			OneSignalDeferred.push(async function(OneSignal) {
				await OneSignal.init({
					appId: "02c6ae39-68c7-4145-a891-582c9c33e6ea",
				});

				if (typeof localStorage !== 'undefined') {
					const saved = localStorage.getItem('notificationsEnabled');
					const wantNotifications = saved === 'true';
					const optedIn = OneSignal.User.PushSubscription.optedIn;

					if (wantNotifications && !optedIn) {
						await OneSignal.User.PushSubscription.optIn();
					} else if (!wantNotifications && optedIn) {
						await OneSignal.User.PushSubscription.optOut();
					}
				}
			});
		</script>
	</body>
</html>
